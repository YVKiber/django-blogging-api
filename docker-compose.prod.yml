services:
  db:
    image: postgres:16
    container_name: blogging_api_prod_db
    restart: always
    environment:
      POSTGRES_DB: blogging_api_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "5434:5432"

  web:
    build: .
    container_name: blogging_api_prod_web
    restart: always
    entrypoint: /entrypoint.prod.sh
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env.production
    depends_on:
      - db

volumes:
  postgres_prod_data:
  static_volume:
  media_volume: